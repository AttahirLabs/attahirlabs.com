name: Site tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"

      - name: Run site tests
        run: |
          node tests/homepage-refresh.test.js
          node tests/apps-navigation.test.js
          node tests/site-navigation.test.js
          node tests/shipping-calculator.test.js
          node tests/fefo-refresh.test.js
