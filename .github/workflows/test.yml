name: Site tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"

      - name: Run every sorted site test
        run: node tests/run-all-tests.js

      - name: Check pull request diff
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ -n "$PR_BASE_SHA" ]; then
            git diff --check "$PR_BASE_SHA...HEAD"
          else
            git show --check --oneline --no-renames HEAD
          fi
