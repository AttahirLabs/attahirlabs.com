<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">How Canada's China surtax stacks with regular import costs</title>
  <desc id="desc">A flow diagram showing value for duty, regular MFN duty, Canada China surtax, GST or HST, and brokerage combining into total landed cost.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#eef2ff" stop-opacity="0.96"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.22"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#818cf8"/>
    </marker>
  </defs>
  <rect width="1200" height="720" rx="32" fill="url(#bg)"/>
  <circle cx="1040" cy="90" r="180" fill="#6366f1" opacity="0.16"/>
  <circle cx="130" cy="640" r="220" fill="#10b981" opacity="0.10"/>
  <text x="72" y="84" fill="#c7d2fe" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22" font-weight="700" letter-spacing="2">ATTAHIR LABS · TARIFFSHIELD</text>
  <text x="72" y="136" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="48" font-weight="800">Canada China surtax stack</text>
  <text x="72" y="178" fill="#cbd5e1" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24">Regular duty doesn't disappear. The surtax layers on top.</text>

  <g filter="url(#shadow)">
    <rect x="72" y="240" width="206" height="142" rx="22" fill="url(#card)"/>
    <text x="102" y="292" fill="#0f172a" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="28" font-weight="800">1. VFD</text>
    <text x="102" y="330" fill="#475569" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20">Invoice + freight</text>
    <text x="102" y="360" fill="#64748b" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18">Base for duty math</text>

    <rect x="322" y="240" width="206" height="142" rx="22" fill="url(#card)"/>
    <text x="352" y="292" fill="#0f172a" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="28" font-weight="800">2. MFN duty</text>
    <text x="352" y="330" fill="#475569" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20">Standard tariff</text>
    <text x="352" y="360" fill="#64748b" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18">Example: 0%–6%</text>

    <rect x="572" y="240" width="236" height="142" rx="22" fill="#fff7ed"/>
    <text x="602" y="292" fill="#9a3412" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="28" font-weight="800">3. Surtax</text>
    <text x="602" y="330" fill="#9a3412" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20">China-origin layer</text>
    <text x="602" y="360" fill="#c2410c" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18">Often 25% on VFD</text>

    <rect x="852" y="240" width="206" height="142" rx="22" fill="url(#card)"/>
    <text x="882" y="292" fill="#0f172a" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="28" font-weight="800">4. Tax + fees</text>
    <text x="882" y="330" fill="#475569" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20">GST/HST</text>
    <text x="882" y="360" fill="#64748b" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18">Brokerage, permits</text>
  </g>

  <path d="M286 311 H312" stroke="#818cf8" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M536 311 H562" stroke="#818cf8" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M816 311 H842" stroke="#818cf8" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="186" y="470" width="828" height="118" rx="24" fill="#ffffff"/>
    <text x="226" y="525" fill="#0f172a" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="30" font-weight="800">Total landed cost</text>
    <text x="226" y="562" fill="#475569" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22">Product cost + freight + duty + surtax + GST/HST + brokerage</text>
    <text x="834" y="545" fill="#4f46e5" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="44" font-weight="900">= margin truth</text>
  </g>

  <text x="72" y="660" fill="#94a3b8" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="18">Use this as a pricing check, not legal advice. Verify HS code, origin, and current CBSA notice before importing.</text>
</svg>