<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Japan duty image candidates</title>
  <style>
    body { margin: 0; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #f8fafc; }
    main { width: min(1180px, calc(100% - 32px)); margin: 32px auto; }
    h1 { font-size: clamp(28px, 4vw, 48px); margin: 0 0 8px; }
    p { color: #cbd5e1; margin: 0 0 28px; }
    .grid { display: grid; gap: 28px; }
    figure { margin: 0; background: #111827; border: 1px solid #334155; border-radius: 18px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,.25); }
    img { display: block; width: 100%; height: auto; }
    figcaption { padding: 16px 18px 18px; font-weight: 700; color: #fff; }
    a { color: #93c5fd; font-weight: 500; margin-left: 8px; }
  </style>
</head>
<body>
<main>
  <h1>Japan import-duty image candidates</h1>
  <p>Temporary noindex review page for comparing four art-direction lanes.</p>
  <div class="grid">
    <figure><img src="1-broker-document-flatlay.jpg" alt="Broker document flat lay"><figcaption>1 — Broker document flat lay <a href="1-broker-document-flatlay.jpg">open full size</a></figcaption></figure>
    <figure><img src="2-customs-inspection-table.jpg" alt="Customs inspection table"><figcaption>2 — Customs inspection table <a href="2-customs-inspection-table.jpg">open full size</a></figcaption></figure>
    <figure><img src="3-product-sample-bench.jpg" alt="Product sample bench"><figcaption>3 — Product sample bench <a href="3-product-sample-bench.jpg">open full size</a></figcaption></figure>
    <figure><img src="4-shipping-scale-closeup.jpg" alt="Shipping scale close-up"><figcaption>4 — Shipping scale close-up <a href="4-shipping-scale-closeup.jpg">open full size</a></figcaption></figure>
  </div>
</main>
</body>
</html>
