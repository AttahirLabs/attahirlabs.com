<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-8QRJWWVMRZ"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-8QRJWWVMRZ');
    </script>
    <title>Contact Us | Attahir Labs</title>
    <style>
        :root {
            --navy: #0f172a;
            --indigo: #6366f1;
            --white: #ffffff;
            --gray-light: #f8fafc;
            --gray-text: #475569;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: var(--navy);
            line-height: 1.7;
            background-color: var(--gray-light);
        }
        .container {
            max-width: 600px;
            margin: 4rem auto;
            padding: 3rem;
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            text-align: center;
        }
        h1 {
            color: var(--indigo);
            margin-bottom: 2rem;
        }
        .contact-info {
            text-align: left;
            margin: 2rem 0;
            padding: 2rem;
            background: var(--gray-light);
            border-radius: 8px;
        }
        .contact-item {
            margin-bottom: 1.5rem;
        }
        .contact-item strong {
            display: block;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--gray-text);
        }
        .contact-item a {
            font-size: 1.25rem;
            color: var(--indigo);
            text-decoration: none;
            font-weight: 500;
        }
        .note {
            font-style: italic;
            color: var(--gray-text);
            margin-top: 2rem;
        }
        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.875rem;
            color: var(--gray-text);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 2rem;
            color: var(--indigo);
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="/" class="back-link">&larr; Back to Home</a>
        <h1>Get in Touch</h1>
        <p>Have questions or need support? We're here to help.</p>

        <div class="contact-info">
            <div class="contact-item">
                <strong>All Inquiries — Support, Privacy, Legal</strong>
                <a href="mailto:support@attahirlabs.com">support@attahirlabs.com</a>
            </div>
        </div>

        <p class="note">We typically respond within 1 business day.</p>
    </div>

    <footer>
        &copy; 2026 Attahir Labs. All rights reserved.
    </footer>

</body>
</html>
